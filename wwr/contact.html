<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us White Water Rafting Company</title>
    <meta name="description"
      content="Whitewater Rafting contact information email phone number linkedin social media map">
    <meta name="author" content="Brittan Daems">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/wwrlogo.jpg" alt="White Water Rafting Logo" width="200">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>

            </ul>
        </nav>

    </header>

    <main>
        <h3>White Water Rafting Company</h3>
        <h4>123 Main River Street</h4>
        <h4>Santa Cruz, California</h4>
        <h4>801-390-9083</h4>
        <h5>info@whitewaterrafting.com</h5>
        <div class="grid">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3187.4880680462434!2d-122.02826025124047!3d36.97428156149151!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808e4026633df9e3%3A0x7948909fb68b206c!2s123%20River%20St%20S%2C%20Santa%20Cruz%2C%20CA%2095060!5e0!3m2!1sen!2sus!4v1774642597260!5m2!1sen!2sus"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="form-item column1">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" required>
                </div>

                <div class="form-item column1">
                    <label for="email">Email</label>
                    <input type="text" name="email" id="email" required>
                </div>


                <fieldset>

                    <legend>Message Purpose</legend>
                    <input type="radio" id="option1" name="choice" value="option1">
                    <label for="option1">General Inquiry</label><br>

                    <input type="radio" id="option2" name="choice" value="option2">
                    <label for="option2">Reservation Question</label><br>

                    <input type="radio" id="option3" name="choice" value="option3">
                    <label for="option3">Website Suggestion</label><br>
                </fieldset>

                <label for="message">Message</label>
                <textarea name="message" id="message" rows="4"></textarea>

                <div class="form-item column2">
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    <input type="checkbox" name="subscribe" id="subscribe">
                </div>

                <button type="submit">Get in Touch!</button>

            </form>

        </div>
        <div class="employee">
            <section>
                <h6>We Are Here to Serve You!</h6>
                <img src="images/employee1jpg.jpg" width="200" alt="employee">
                <img src="images/employee2.jpg" width="200" alt="employee">
                <img src="images/employee3.jpg" width="200" alt="employee">
            </section>
        </div>
    </main>
    <footer>
        <p>&copy;2026 Whitewater Rafter Brittan Daems</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/">
                <img src="images/facebooklogo.png" alt="Facebook logo" width="100">
            </a>
            <a href="https://www.instagram.com/">
                <img src="images/instagram.jpg" alt="instagram logo" width="100">
            </a>
            <a href="https://www.linkedin.com/">
                <img src="images/linkedinlogo.png" alt="LinkedIn logo" width="100">
            </a>
        </nav>

    </footer>
</body>

</html>
