<!DOCTYPE html>
<html lang="en">

<head>

    <main>

        <section>
            <h2>heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ipsum, ullam?</p>
        </section>
        <section>
            <h2>heading</h2>
