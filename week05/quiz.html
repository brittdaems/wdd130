<!DOCTYPE html>
<html lang="english">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<Header>
    <h1>Forms Quiz Code Along</h1>
</Header>
<main>
    <form>
        <label for="htmlname">What does html stand for?</label>
        <input type="text" name="q1" id="q1">

        <label for="codeassign">How do you assign css code to a div?</label>
        <textarea name="q2" id="q2" rows="4"></textarea>

        <label for="color">Which of the following is the corrent code to change the color of the
            text?</label>
        <select name="q3" id="q3">
            <option value="1">background-color</option>
            <option value="2">text-color</option>
            <option value="3">color</option>
        </select>


    </form>
    <button type="submit">Submit Quiz</button>

</main>
